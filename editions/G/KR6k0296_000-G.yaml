body:
  text: 根本說一切有部毗柰耶自行抄凡例律制有四清淨苾芻共住同學同見即可羯磨結界行眾僧事若勝緣不具僧事莫辦者亦應隨分隨力依律行持毋待他人獨修勝行是編之作意在於斯宗根本有部羯磨之文集心念對首法十數篇心念者一人對首者二三人若四人已上僧法悉不載入懺罪法闕前三者以犯首不能懺犯次三者須僧中懺事非易辦故悉闕而不載說罪乃至分別等文皆頂格寫其他低一格寫附以私記者小字雙行並冠案字而示區別是編專集行事之文此屬作持於開遮之戒相此屬止持未能詳載學者幸廣覽律文窮其原委若樂簡者精讀律攝十四卷亦可通其概略專習四分律者宜準是編規式別集四分律自行抄依之行持檢尋良便昔年余嘗集錄未盡數章遂爾中輟後之學者幸其賡續斯業歲次北陸歌栗底迦月於永寧晚晴院重治校定根本說一切有部毗柰耶自行抄目錄第一章懺罪法第一節懺泥薩祇波逸底迦法第二節懺波逸底迦法第三節懺突色訖里多法第二章襃灑陀法第三章安居法第一節安居法第二節受日法第四章隨意法第五章衣藥受淨法附鉢及金銀法第一節受衣法第二節捨衣法第三節受捨鉢法第四節受藥法第五節長衣分別法第六節金銀分別法第七節餘食法附錄食罷發願法
