body:
  text: 沙門曇昉集第一章懺罪法第一節懺泥薩祇波逸底迦法律攝云若苾芻隨犯一一泥薩祇罪其物不捨夜不為隔罪不說悔或於三中闕一不作若更得餘物或同類或異類謂諸衣物網絡水羅及腰絛等但是出家沙門資具而受畜者初入手時即得泥薩祇罪由前罪勢相染生故無犯者謂物已捨復為間隔罪已說悔言捨物者謂持有犯物捨與無犯清淨苾芻言間隔者謂今日捨衣至第三日明相出已方名為隔由其中間全隔一日故有處說云唯經一宿其罪說悔者謂說露其罪為三事已方取本物捨物之時咸對別人不應對眾設令對眾亦不應共分此物除第二鉢此鉢令捨與眾故諸衣服等對近圓人金銀等寶對未近圓人及在家俗人其七日藥對非近圓等瞋奪他衣還彼奪處凡捨物時所對之人有其四種謂可委信不解律藏或解律藏不可委信或俱非俱是應持犯物對第四人而為捨法應如是說具壽存念此是我物犯捨墮今捨與具壽隨意所為此物如前作間隔已應還彼苾芻告言大德此是汝物可隨意用案自下為說罪犯罪苾芻應對一苾芻隨其所應具威儀已應如是說說罪本云阿鉢底提舍那舊譯作懺悔非關此義具壽存念我苾芻某甲畜長衣長仗音餘也多也犯泥薩祇波逸底迦及不敬教波逸底迦各有方便突色訖里多罪隨犯應說此所犯罪我今於具壽前並皆發露說罪我不覆藏由發露說罪故得安樂不發露說罪不安樂三說彼應問言汝見罪否答言我見又問言將來諸戒能善護否答言善護所對苾芻應云奧箄迦梵語此義翻為方便由作此事是解脫之方便也其說罪者答言娑度此云善哉百一羯磨云次後苾芻應於其物或守持分別或捨施人勿起疑惑律攝云不應對彼犯同分罪人而為發露謂波羅市迦望波羅市迦為同分乃至突色訖里多望突色訖里多為同分言同分者是相似意謂同罪者案今人犯罪已若不同犯清淨苾芻不得值者宜依五分律開緣向犯同分罪者懺罪罪便得除五分律云有一病比丘犯罪語一比丘大德我犯此罪彼言我亦犯此罪不得悔過而終諸比丘作是念若世尊聽向同犯一罪比丘悔過者不使此比丘不悔而終以是白佛佛言今聽同犯不同犯皆得向悔寄歸傳云律云應先嗢屈竹迦譯為蹲踞雙足履地兩膝皆豎攝斂衣服勿令垂地即是持衣說淨常途軌式或對別人而說罪或向大眾而申敬或被責而請忍或受具而禮僧皆同斯也毗柰耶雜事云年少苾芻應喚老者為大德老喚少年為具壽若不爾者得越法罪案今文中皆云具壽存念若少年對老者應改大德存念律攝云諸學處於方便位皆悉許有不敬聖教波逸底迦案準是於懺根本罪已並懺不敬聖教波逸底迦又各方便突色訖里多亦并須懺懺罪計數具如受用三水要行法中廣明須者尋之又云若起心欲取得責心惡作已起方便得對說惡作諸墮罪處類此應知百一羯磨云娑度譯為善凡是作法了時及隨時白事皆如是作若不說者得越法罪第二節懺波逸底迦法說罪要行法云應對不同犯清淨苾芻隨其大小而為敬儀蹲踞合掌憶其罪名作如是說具壽存念我苾芻某甲有故妄語等隨其犯者稱之犯眾多根本波逸底迦罪及眾多方便惡作罪此等諸罪各有不敬聖教波逸底迦罪及此方便惡作罪并不向人發露各有覆藏罪此所犯罪我今於具壽前從清淨來並皆發露不作覆藏由發露已便得安樂三說已彼應問言汝見罪否答言我見又問將來諸戒能善護否答言能護所對苾芻應云奧箄迦其說罪者答言娑度第三節懺突色訖里多法律攝云此中犯者若苾芻不依佛教不顧羞恥欲為非法者捉衣開張得責心惡作若披著身得對說惡作若苾芻有順奉心而著衣不如法或時忘念或是無知非法著者唯犯責心惡作如是於餘學處準此應知案已上所載律攝之文指眾學法第二不太高著裙而言說罪要行法云作如是說具壽存念我苾芻某甲有故不嚼齒木等隨有稱之犯眾多根本惡作罪及眾多方便惡作罪此等諸罪各有不敬聖教波逸底迦罪及此方便惡作罪并不向人發露各有覆藏罪已下同上懺波逸底迦法又云云何責心凡出家者於不謹慎心中遠律教時即須自責心云此事是我所不應作我從今已去更不如是若常能如此自尅責時自然不虧諸戒須知佛教意在於此第二章襃灑陀法百一羯磨云梵云襃灑陀者襃灑是長養義陀是清淨洗濯義意欲令半月半月憶所作罪冀改前愆一則遮現在之更為二則懲未來之慢法舊云布薩者訛又云佛告鄔波離於障難時有其六事心念得成一謂受持三衣二捨三衣三分別長衣四捨別請五作長淨六作隨意律攝云若至長淨日唯獨一身者應於長淨之處以新瞿摩塗拭灑掃敷座席鳴楗椎作前方便竟自誦少多經已於高逈處觀客苾芻若有三人來共為長淨若無來者時彼苾芻應居本座心念口言作如是說今十四日或十五日僧伽長淨我苾芻某甲於十四日亦為長淨我苾芻某甲於諸障法自陳徧淨我今且為守持長淨若於後時遇和合眾我當共和合眾而為長淨滿諸戒聚故三說若有一二人來者應為對首長淨準一人法作案應於心念長淨文首增具壽存念又二三人對首長淨者應一一輪流相向說非同時說也案一人獨居當長淨日若無犯罪應如是心念若有犯罪並無人可向發露者應依僧祇律中先作念待人然後自陳清淨之法僧祇律云若一比丘有罪者應作是念若得清淨比丘此罪當如法除作是念已應心念口言今十五日僧作布薩我比丘某甲清淨受布薩今若旁採此說者唯用作念待人之文已後心念長淨仍依本律律攝云應為長淨而不為者得越法罪不應長淨而輒為者亦越法罪又云若安居竟為隨意時即名長淨更不須作第三章安居法第一節安居法寄歸傳云若前安居謂五月黑月一日後安居則六月黑月一日唯斯兩日合作安居於此中間文無許處至八月半是前夏了至九月半是後夏了百一羯磨云應向屏處對一苾芻蹲踞合掌作如是說具壽存念今僧伽五月十六日作夏安居我苾芻某甲亦於五月十六日作夏安居我苾芻某甲於此住處內案原文作界內今闕界字前三月夏安居案已下原文云以某甲為施主某甲為營事人某甲為瞻病人於此住處乃至若有圮裂穿壞當修補之今闕我於今夏在此安居三說所對苾芻應云奧箄迦說安居者答云娑度案本律無心念安居法考四分律云時諸比丘住處無所依人不知何所白諸比丘有疑不知成安居否即白世尊世尊言發意為安居故便得成安居從今日聽諸比丘若無所依人心念安居而四分無心念安居文準義應依本律對首安居文刪其首端具壽存念及後奧箄迦娑度第二節受日法百一羯磨云必有因緣聽諸比丘守持七日法出界外隨時對一苾芻蹲踞合掌作如是說具壽存念我苾芻某甲於此住處前三月夏安居我苾芻某甲為某事因緣故守持七日出外案原文作界外今闕界字若無難緣還來此處我於今夏在此安居三說所對之人應云奧箄迦守持日者答言娑度律攝云或有一夜事來乃至六日準七日應受或頻受一日或重受七日量事守持悉皆無犯案本律無心念受日法考十誦律善誦毗尼序云佛告優波離若阿蘭若比丘獨處一身聽一心念今日布薩說戒得說戒法自恣受衣受七日法受七日藥與一請及淨施衣物亦爾而十誦無心念受日文準義應依本律對首受日文刪其首端具壽存念及後奧箄迦娑度第四章隨意法寄歸傳云凡夏罷歲終之時此日應名隨意即是隨他於三事之中任意舉發說罪除愆之義舊云自恣者是義翻也毗柰耶隨意事云具壽鄔波離白佛言大德若有住處唯一苾芻獨住此欲如何作隨意事佛言應於住處灑掃清淨瞿摩塗已應敷座席作眾事訖隨其力分自誦少多經已應於高逈處四望看有苾芻來知是清淨若二三人即應相喚速來共為隨意然即於彼客苾芻所對首法作如是言具壽存念今十五日是隨意日我苾芻某甲亦十五日且為守持隨意若於後時遇和合眾當共彼和合眾如是法隨意三說若其眾多無智愚癡之人足眾數為隨意者不成隨意應待有善苾芻來共為隨意若無應居本座作心念隨意如是心念口言今十五日是隨意日我苾芻某甲亦十五日為心念隨意若於後時有如法眾共為隨意三說若有一二三苾芻共住者亦應如前作對首法作其隨意若有四人僧伽作隨意者咸作對首隨意不差五德為隨意事若滿五人方為眾法即應作白為隨意事又云若苾芻至隨意時若憶知有罪應於餘處苾芻所作說悔法方可作隨意若不說罪作隨意者不成隨意案一人獨居當隨意日若有犯罪無人可向發露者亦依僧祇律中先作念待人之法如襃灑陀法中說第五章衣藥受淨法附鉢及金銀法第一節受衣法寄歸傳云言六物者一僧伽胝譯為複衣也二嗢呾囉僧伽譯為上衣也三安呾婆娑譯為內衣也此之三衣皆名支伐羅北方諸國多名法衣為袈裟乃是赤色之義非律文典語四波呾囉鉢也五尼師但那坐臥具也六鉢里薩囉伐拏濾水羅也受戒之時要須具斯六物也十三資具者一僧伽胝二嗢呾囉僧伽三安呾婆娑四尼師但那五裙六副裙七僧脚崎掩腋衣也八副僧脚崎九拭身巾十拭面巾十一剃髮衣十二覆瘡疥衣十三藥資具衣十三種衣出家開畜隨得隨持無勞總足餘外長衣量事分別若氈褥毯席之流但須作其委付他心而受用也又云其藥直衣佛制畜者計當用絹可二丈或可一匹既而病起無恆卒求難濟為此制畜可預備之病時所須無宜輒用目得迦云制諸苾芻畜藥直衣若遇病時賣以充藥其藥直衣不應浣染應持新㲲并留其𦆠西國畜白㲲一雙此方當絹一匹也律攝云此等諸衣各別牒名而守持之應對一苾芻作如是說具壽存念我苾芻某甲此僧伽胝衣我今守持已作成衣是所受用三說目得迦云餘衣守持準此應作其藥直衣應加為病因緣是所受用案本律許心念守持三衣而無心念文應依對首文刪具壽存念律攝云若得未浣染未割截物權充衣數者應如是守持具壽存念我苾芻某甲此衣我今守持當作九條僧伽胝衣兩長一短若無障難我當浣染割截縫刺是所受用三說餘二同此若無苾芻對餘四眾亦成守持第二節捨衣法律攝云若有緣捨三衣者對一苾芻應如是捨具壽存念我苾芻某甲此僧伽胝衣是我先守持衣今捨三說餘二準此案本律許心念捨三衣而無心念文應依對首文刪具壽存念第三節受捨鉢法律攝云若如法鉢應守持以鉢置左手中張右手掩鉢口上作如是說具壽存念我苾芻某甲此鉢呾囉是大仙器是乞食器我今守持常用食故三說若欲捨者準捨衣法若有兩鉢應持好者餘應分別案本律無心念守持鉢法或可以心念守持三衣法例之依對首文刪具壽存念捨亦如是第四節受藥法律攝云言諸藥者總有四種一時藥二更藥三七日藥四盡壽藥然此四種皆能療疾並名為藥病者所須非無病者即此四種服食之時皆應先作療病心已然後受用言時藥者謂五正食及五嚼食等此並時中合食故名時藥言更藥者謂八種漿即芭蕉子蒲萄果等若橘柚櫻梅甘蔗糖蜜等亦聽作漿又有六種醋物依夜分齊故名更藥言七日藥者謂酥油粆糖及蜜言盡壽者有其五種謂根莖葉花果又有五種黏藥五種灰藥五種鹽藥五種澀物藥斯等咸是舉類而言若更有餘用皆無犯毗柰耶藥事云若更藥七日藥盡壽藥與時藥相和應作時服非時不服若七日盡壽與更藥相和應齊更分服過此更分不應服若盡壽藥與七日藥相和應七日服過七日不應服若盡壽與盡壽藥相和應盡壽服若不依者得越法罪律攝云若欲作漿齊更飲者時中料理時中受取對人加法至初夜盡自取而飲若過此時便不應飲時中飲者隨濾不濾非時飲者必須澄濾又七日藥者一受已後作法守持齊七日內食之無犯若有病緣非時須服欲求他授復無淨人應七日守持或時隨路自持而行目得迦云粆糖等漿過甜者以蒲萄石榴及橘柚等捼使破碎以物淨濾勿令稠濁和攪而飲時具壽鄔波離白佛言其粆糖飲頗得守持經七日否佛言得齊何應飲乃至澄清未醋已來體未變者隨意當飲百一羯磨註云西國造粆糖時皆安米屑如造石蜜安乳及油佛許非時開其噉食準斯道理東夏飴糖縱在非時亦應得食律攝云言應自守持者謂在時中先淨洗手受取其藥對一苾芻置左手中右手掩上作如是說具壽存念我苾芻某甲有是病緣此清淨藥我今守持齊初更中自服若更藥者應云齊初更中自服若七日藥者應云於七日內自服若盡壽藥者應云至盡壽來自服及同梵行者三說七日藥觸宿而服者謂得自觸共宿而食不須更受時更盡壽未越期限皆無自觸等過又云七日藥既守持訖應生心念我此藥七日當服若不標心服食咽咽得惡作罪為好容儀或著滋味或求肥盛或詐偽心服食諸藥皆惡作罪受七日藥正服之時應告同梵行者作如是語我已一日服藥訖餘六日在我當服之乃至七日皆應準知案本律無心念受藥法依十誦律善誦毗尼序許心念受藥應用本律對首文刪具壽存念百一羯磨註云問下之三藥如守持已分局分明必不守持齊何應用答此之三藥若其中前受已過午便不合餐過午受之初更得食同更藥也又此四藥既自受已自分未過被未具者觸隨可更受而服如過自限若觸不觸並宜須棄又問如其三藥先守持已未具輒觸更得用否答本意守持為防自取他既觸已法則便亡理可棄之無宜復用必其貧者開換施人決意與他施還受取義同新得耳第五節長衣分別法律攝云若苾芻有餘長衣合分別者或已成衣或未成衣應於阿遮利耶鄔波馱耶處作委寄意而分別之或餘尊人或同梵行其委寄人持戒多聞所有德行過於己者委寄為善應如是說羯磨云應持其物對餘苾芻作如是說具壽存念我苾芻某甲有此長衣未為分別是合分別舊云說淨者取意也我今於鄔波馱耶處而作分別以鄔波馱耶作委寄者我今持之三說其委寄人假令身在大海之外遙為委寄分別無犯為分別時不應對彼委寄之人應共餘者而為分別委寄之人不應取彼分別之物又復不應見委寄人身死之後眾取其衣作亡人物分之此是作法與委寄人非是實施其委寄人雖復身死未聞已來並成分別若聞死已應指餘人為委寄者其委寄人不應言請亦勿告知百一羯磨註云此中但云於其二師而為委寄意道彼師之衣表其離著無屬己之累然亦不須請為施主律文但遣遙指即休不合報知其人若死餘處任情但有如此一途分別衣法更無展轉真實之事設有餘文故非斯部之教凡言委寄者欲明其人是可委付百一羯磨云若衣方圓滿一肘者即是分別衣中極少之量如不守持分別俱犯捨墮如其寬中不滿長中過者此即不勞分別直爾持畜案本律許心念分別長衣而無心念文應依對首文刪具壽存念律攝云若長毛衣及重大物不堪守持其毛短者應守持用長毛重大應作委寄他心而受用之得重物時應心念口言此是某甲施主物我為彼故而受用之不須分別又云若是別人物皆須作委寄法而為受用應對苾芻作如是說具壽存念此重大衣以某甲施主為委付者我為彼想而受用之三說第六節金銀分別法律攝云施主持衣價與苾芻眾即作委寄此施主心而受取之諸苾芻應求敬信人若寺家淨人若鄔波索迦為淨施主苾芻若得金等物時作施主物想執捉無犯縱相去遠得不淨物遙作施主物心持之乃至施主命存以來並皆無犯若無施主可得者應持金銀等物對一苾芻隨住隨立作如是說具壽存念我苾芻某甲得此不淨財當持此不淨財換取淨財三說應自持舉或令人舉第七節餘食法律攝云足食竟若得餘食作法食者自身樂住施主得福欲作法時先淨洗手受得食已應持就一未足苾芻或雖已足未離本座對彼蹲踞告曰具壽存念我苾芻某甲食已遮足今復得此噉食或嚼食我欲更食願與我作餘食法時彼苾芻取兩三口食已報曰此是汝物隨意應食此據前人自未遮足得食無犯若自足已便不合食應以手按報言如上附錄食罷發願法說罪要行法云準如律教若苾芻食了之時若須誦持欹拏伽他謂施頌也隨於靜處或坐或立或可經行先誦小經一紙半紙次誦伽他云飯食已訖當願眾生德行充盈成十種力所為布施者必獲其義利若為樂故施後必得安樂諸以寺舍房宇布施眾僧造寺之主及護寺天神國主百僚師僧父母因緣眷屬及一切眾生若先亡者願生西方見阿彌陀佛或生覩史多天見慈氏尊者脫屣塵勞悟無生忍其現存者願無病長壽福智莊嚴願我自身無諸障惱常持淨戒不犯尸羅於小罪中心生大懼於所犯罪悉皆發露盡未來際不失信心逢善知識願生中國離於八難常存正見至求解脫恆與眾生作不請之友案若願往生西方者其願生中國等二十五字應改作願生西方見佛聞法受菩提記廣度眾生其他文句亦得以己意小有增損即以此福普施一切同出有流證無上果若於每日不作如是念誦發願者是懈怠人不銷信施
